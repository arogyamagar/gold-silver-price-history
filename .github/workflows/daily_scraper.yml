name: Daily Bullion Rate Scraper

on:
  schedule:
    # 8:00 PM NPT (UTC+5:45) corresponds to 14:15 UTC (2:15 PM UTC)
    - cron: '15 14 * * *'
  
  # Allows manual triggering from the GitHub Actions tab anytime
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Execute Scraper
        run: node scrape_bullion.js

      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add products.json
          
          # Check if there are changes staged for commit
          if git diff --staged --quiet; then
            echo "No price updates recorded for today."
          else
            git commit -m "chore: update bullion rates [$(date +'%Y-%m-%d')]"
            git push
          fi